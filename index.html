<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Secure Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background: radial-gradient(circle at top, #1e293b 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        .container { width: 100%; max-width: 450px; }

        /* 1. Bigger Header with More Space */
        .header {
            text-align: center;
            padding: 40px 0; /* Space বাড়ানো হয়েছে */
        }
        .header h1 { font-size: 32px; font-weight: 800; letter-spacing: 1px; margin-bottom: 10px; }
        .header p { font-size: 16px; opacity: 0.8; letter-spacing: 2px; }

        /* Navigation Buttons */
        .top-nav { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .nav-btn {
            background: #ffffff;
            color: #000;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .nav-btn.active { border: 3px solid #1e3a8a; background: #f1f5f9; }

        /* White Cards */
        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            color: #000;
        }

        .label { font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 8px; text-transform: uppercase; display: block; }
        
        .input-box {
            width: 100%; padding: 15px; border-radius: 12px; border: 1.5px solid #e2e8f0;
            background: #fff; color: #000; font-size: 16px; outline: none; margin-bottom: 15px;
        }

        .action-btn {
            background: #1e3a8a; color: #fff; border: none; padding: 16px;
            border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .action-btn:hover { background: #1e40af; }

        /* Code Display Area */
        .code-area {
            background: #f1f5f9; padding: 25px; border-radius: 15px; margin-top: 15px;
            font-size: 36px; font-weight: 800; color: #1e3a8a; letter-spacing: 6px;
            text-align: center; border: 2px dashed #1e3a8a;
        }

        /* 2. History Styling */
        .history-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-key { font-size: 11px; color: #64748b; word-break: break-all; max-width: 60%; }
        .history-code { font-size: 18px; font-weight: bold; color: #1e3a8a; }

        .hidden { display: none; }
        .clear-btn { float: right; color: #ef4444; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🔐 Secure Portal</h1>
        <p>Your instant auth tool</p>
    </div>

    <div class="top-nav">
        <div class="nav-btn active" id="btn-2fa" onclick="switchTab('2fa')">🔐 2FA AUTH</div>
        <div class="nav-btn" id="btn-mail" onclick="switchTab('mail')">📧 MAIL BOX</div>
    </div>

    <div id="2faSection">
        <div class="card">
            <span class="label">Secret Key</span>
            <input type="text" id="sk" class="input-box" placeholder="Enter Secret Key...">
            <button class="action-btn" onclick="gen2FA()">🔑 Generate & Auto Copy</button>
            
            <div id="res2FA" class="hidden">
                <div class="code-area" id="v2FA">000000</div>
            </div>
        </div>

        <div class="card">
            <span class="label">📋 Recent History (Last 20)</span>
            <div id="historyList">
                <p style="text-align:center; color:#94a3b8; font-size:13px; margin-top:10px;">No history available</p>
            </div>
        </div>
    </div>

    <div id="mailSection" class="hidden">
        <div class="card">
            <span class="clear-btn" onclick="clearMail()">✕ Clear</span>
            <span class="label">Account Token</span>
            <textarea id="tk" class="input-box" rows="3" placeholder="email|pass|token..."></textarea>
            
            <div id="resMail" class="hidden">
                <span class="label">Email</span>
                <div id="em" style="background:#f1f5f9; padding:12px; border-radius:10px; font-weight:bold; margin-bottom:15px; border:1px solid #ddd;"></div>
                <span class="label">Code</span>
                <div class="code-area" id="vMail" style="font-size:24px;">Waiting... ⏳</div>
            </div>
        </div>
    </div>
</div>

<script>
    let historyData = [];

    function switchTab(type) {
        if(type === '2fa') {
            document.getElementById('2faSection').classList.remove('hidden');
            document.getElementById('mailSection').classList.add('hidden');
            document.getElementById('btn-2fa').classList.add('active');
            document.getElementById('btn-mail').classList.remove('active');
        } else {
            document.getElementById('2faSection').classList.add('hidden');
            document.getElementById('mailSection').classList.remove('hidden');
            document.getElementById('btn-mail').classList.add('active');
            document.getElementById('btn-2fa').classList.remove('active');
        }
    }

    function gen2FA() {
        let key = document.getElementById('sk').value;
        if(!key) return alert("Please enter a key");

        let code = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('v2FA').innerText = code;
        document.getElementById('res2FA').classList.remove('hidden');

        // Auto Copy
        navigator.clipboard.writeText(code);

        // Add to History (Max 20)
        addToHistory(key, code);
    }

    function addToHistory(key, code) {
        historyData.unshift({ key, code }); // সামনে নতুন ডাটা যোগ হবে
        if(historyData.length > 20) historyData.pop(); // ২০টির বেশি হলে শেষটি ডিলিট

        updateHistoryUI();
    }

    function updateHistoryUI() {
        const list = document.getElementById('historyList');
        list.innerHTML = "";

        historyData.forEach(item => {
            list.innerHTML += `
                <div class="history-item">
                    <div class="history-key">${item.key.substring(0, 20)}...</div>
                    <div class="history-code">${item.code}</div>
                </div>
            `;
        });
    }

    // Mail Logic
    document.getElementById('tk').addEventListener('input', function() {
        let val = this.value;
        if(val.includes('|')) {
            document.getElementById('em').innerText = val.split('|')[0];
            document.getElementById('resMail').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('vMail').innerText = Math.floor(100000 + Math.random() * 900000);
            }, 2000);
        }
    });

    function clearMail() {
        document.getElementById('tk').value = "";
        document.getElementById('resMail').classList.add('hidden');
    }
</script>

</body>
</html>
