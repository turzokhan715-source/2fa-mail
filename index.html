<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Authentication Portal</title>
    <style>
        /* 🌑 Dark Mode Base */
        html, body {
            background-color: #000000 !important;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        .header h1 {
            text-align: center;
            font-size: 22px;
            color: #ffffff;
            margin-bottom: 20px;
        }

        /* ⚪ White Cards for contrast */
        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            margin-bottom: 16px;
            color: #000000; /* Card এর ভেতর সব লেখা কালো */
        }

        /* 🔵 Navy Blue Buttons */
        .btn, .nav-button, .copy-btn {
            background: #000080; /* Navy Blue */
            color: white !important;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .nav-button {
            width: 48%;
            display: inline-block;
        }

        /* ⌨️ White Input Boxes with Black Text */
        .input-box {
            width: 100%;
            padding: 12px;
            border: 2px solid #000080;
            border-radius: 8px;
            background: #ffffff !important;
            color: #000000 !important;
            font-size: 15px;
            margin-top: 8px;
            box-sizing: border-box;
        }

        .code-display {
            background: #f0f0f0;
            color: #000080;
            font-size: 30px;
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            letter-spacing: 5px;
            margin: 10px 0;
        }

        .hidden { display: none; }
        .back-btn { color: #ffffff; cursor: pointer; margin-bottom: 15px; display: inline-block; }
        
        .success-message {
            background: #008000;
            color: white;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="mainPage">
            <div class="header">
                <h1>🔐 Secure Authentication Portal</h1>
            </div>
            <div class="card" style="text-align: center;">
                <button class="nav-button" onclick="showMail()">📧 MAIL BOX</button>
                <button class="nav-button" onclick="show2FA()">🔐 2FA AUTH</button>
            </div>
        </div>

        <div id="2faPage" class="hidden">
            <span class="back-btn" onclick="showMain()">← Back</span>
            <div class="card">
                <h3>🔐 2FA Authenticator</h3>
                <label>SECRET KEY</label>
                <input type="text" id="secretKey" class="input-box" placeholder="Enter key here">
                <button class="btn" onclick="generate2FA()">Generate Code</button>
                <div id="res2FA" class="hidden">
                    <div class="code-display" id="val2FA">000000</div>
                    <button class="btn" style="background:#333" onclick="copy('val2FA')">Copy Code</button>
                </div>
            </div>
        </div>

        <div id="mailPage" class="hidden">
            <span class="back-btn" onclick="showMain()">← Back</span>
            <div class="card">
                <div style="display:flex; justify-content: space-between;">
                    <h3>📧 Mail Box</h3>
                    <button onclick="clearMail()" style="color:red; border:none; background:none; cursor:pointer;">Clear</button>
                </div>
                <textarea id="tokenInput" class="input-box" style="height:80px" placeholder="email|pass|token" oninput="extractEmail()"></textarea>
                
                <div id="mailResult" class="hidden">
                    <p style="margin-top:10px;">Extracted Email:</p>
                    <div id="extEmail" style="font-weight:bold; padding:8px; background:#eee; border-radius:5px;"></div>
                    <div class="code-display" id="mailCode">Waiting... ⏳</div>
                    <button class="btn" onclick="copy('mailCode')">Copy Code</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showMain() {
            document.getElementById('mainPage').classList.remove('hidden');
            document.getElementById('2faPage').classList.add('hidden');
            document.getElementById('mailPage').classList.add('hidden');
        }
        function show2FA() {
            document.getElementById('mainPage').classList.add('hidden');
            document.getElementById('2faPage').classList.remove('hidden');
        }
        function showMail() {
            document.getElementById('mainPage').classList.add('hidden');
            document.getElementById('mailPage').classList.remove('hidden');
        }

        function generate2FA() {
            let key = document.getElementById('secretKey').value;
            if(!key) return alert("Enter key");
            document.getElementById('res2FA').classList.remove('hidden');
            document.getElementById('val2FA').innerText = Math.floor(100000 + Math.random() * 900000);
        }

        function extractEmail() {
            let val = document.getElementById('tokenInput').value;
            if(val.includes('|')) {
                document.getElementById('extEmail').innerText = val.split('|')[0];
                document.getElementById('mailResult').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('mailCode').innerText = Math.floor(100000 + Math.random() * 900000);
                }, 2000);
            }
        }

        function clearMail() {
            document.getElementById('tokenInput').value = '';
            document.getElementById('mailResult').classList.add('hidden');
        }

        function copy(id) {
            let text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            alert("Copied!");
        }
    </script>
</body>
</html>
