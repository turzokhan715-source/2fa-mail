<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Auth - Ultra Premium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body {
            background: #05070a;
            background: radial-gradient(circle at 50% -20%, #1e3a8a33 0%, #05070a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        .container { width: 100%; max-width: 440px; }

        /* 1. Unique Premium Header */
        .header {
            text-align: center;
            padding: 50px 0 30px 0;
        }
        .header h1 { 
            font-size: 34px; 
            font-weight: 800; 
            background: linear-gradient(135deg, #fff 0%, #64748b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .header p { font-size: 14px; color: #94a3b8; letter-spacing: 3px; text-transform: uppercase; }

        /* Navigation - Glass effect */
        .top-nav { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .nav-btn {
            padding: 14px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            color: #94a3b8;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-btn.active { 
            background: #ffffff; 
            color: #000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Premium White Card */
        .card {
            background: rgba(255, 255, 255, 1);
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            color: #0f172a;
            position: relative;
            overflow: hidden;
        }

        .label { 
            font-size: 11px; 
            font-weight: 800; 
            color: #94a3b8; 
            margin-bottom: 10px; 
            text-transform: uppercase; 
            display: flex;
            justify-content: space-between;
        }
        
        .input-box {
            width: 100%; 
            padding: 16px; 
            border-radius: 16px; 
            border: 1.5px solid #f1f5f9;
            background: #f8fafc; 
            color: #0f172a; 
            font-size: 15px; 
            outline: none; 
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .input-box:focus { border-color: #1e3a8a; background: #fff; }

        .action-btn {
            background: #0f172a; 
            color: #fff; 
            border: none; 
            padding: 18px;
            border-radius: 18px; 
            width: 100%; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .action-btn:hover { background: #1e3a8a; transform: translateY(-2px); }

        /* Code Result Area */
        .result-wrap {
            margin-top: 20px;
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .code-area {
            background: #f1f5f9; 
            padding: 25px; 
            border-radius: 20px; 
            font-size: 42px; 
            font-weight: 800; 
            color: #1e3a8a; 
            letter-spacing: 8px;
            text-align: center; 
            border: 2px solid #e2e8f0;
            position: relative;
        }

        .copy-badge {
            font-size: 10px;
            background: #22c55e;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            position: absolute;
            top: -10px;
            right: 20px;
            display: none;
        }

        /* History List */
        .history-item {
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            border-radius: 16px;
            padding: 15px;
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }
        .history-item:hover { border-color: #cbd5e1; }
        .history-key { font-size: 12px; color: #64748b; font-weight: 500; }
        .history-code { font-size: 18px; font-weight: 700; color: #0f172a; }

        .hidden { display: none; }
        .clear-link { color: #ef4444; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Sleek Auth</h1>
        <p>Premium Protection</p>
    </div>

    <div class="top-nav">
        <div class="nav-btn active" id="tab-2fa" onclick="switchTab('2fa')">2FA Authenticator</div>
        <div class="nav-btn" id="tab-mail" onclick="switchTab('mail')">Mail Extractor</div>
    </div>

    <div id="section-2fa">
        <div class="card">
            <span class="label">Secret Key</span>
            <input type="text" id="sk" class="input-box" placeholder="Enter key to generate...">
            <button class="action-btn" onclick="generate2FA()">
                <span>⚡</span> Generate & Copy
            </button>
            
            <div id="wrap-2fa" class="result-wrap hidden">
                <div class="code-area">
                    <span id="val-2fa">000000</span>
                    <span id="badge-2fa" class="copy-badge">COPIED</span>
                </div>
            </div>
        </div>

        <div class="card" style="padding: 20px 25px;">
            <span class="label">Recent History <span>20 Limit</span></span>
            <div id="list-history">
                <p style="text-align:center; color:#cbd5e1; font-size:13px; margin: 10px 0;">No active history</p>
            </div>
        </div>
    </div>

    <div id="section-mail" class="hidden">
        <div class="card">
            <span class="label">Account Token <a class="clear-link" onclick="clearMail()">Clear</a></span>
            <textarea id="tk" class="input-box" rows="3" placeholder="email|pass|token..."></textarea>
            
            <div id="wrap-mail" class="result-wrap hidden">
                <span class="label">Target Email</span>
                <div id="ext-email" style="background:#f1f5f9; padding:15px; border-radius:12px; font-weight:700; margin-bottom:20px; font-size:14px; border:1px solid #e2e8f0;"></div>
                
                <span class="label">Verification Code</span>
                <div class="code-area">
                    <span id="val-mail" style="font-size: 28px; letter-spacing: 4px;">Waiting...</span>
                    <span id="badge-mail" class="copy-badge">COPIED</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let history = [];

    function switchTab(tab) {
        document.getElementById('section-2fa').classList.toggle('hidden', tab !== '2fa');
        document.getElementById('section-mail').classList.toggle('hidden', tab !== 'mail');
        document.getElementById('tab-2fa').classList.toggle('active', tab === '2fa');
        document.getElementById('tab-mail').classList.toggle('active', tab === 'mail');
    }

    function generate2FA() {
        const key = document.getElementById('sk').value;
        if(!key) return;

        const code = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('val-2fa').innerText = code;
        document.getElementById('wrap-2fa').classList.remove('hidden');

        // --- AUTO COPY LOGIC ---
        copyToClipboard(code, 'badge-2fa');

        // Add to history
        history.unshift({ key: key.substring(0,15), code });
        if(history.length > 20) history.pop();
        updateHistory();
    }

    function updateHistory() {
        const list = document.getElementById('list-history');
        list.innerHTML = history.map(item => `
            <div class="history-item">
                <div class="history-key">🔑 ${item.key}...</div>
                <div class="history-code">${item.code}</div>
            </div>
        `).join('');
    }

    // Mail Extractor Logic
    document.getElementById('tk').addEventListener('input', function(e) {
        const val = e.target.value;
        if(val.includes('|')) {
            document.getElementById('ext-email').innerText = val.split('|')[0];
            document.getElementById('wrap-mail').classList.remove('hidden');
            
            // Simulation
            setTimeout(() => {
                const code = Math.floor(100000 + Math.random() * 900000);
                const el = document.getElementById('val-mail');
                el.innerText = code;
                copyToClipboard(code, 'badge-mail');
            }, 2500);
        }
    });

    function copyToClipboard(text, badgeId) {
        navigator.clipboard.writeText(text).then(() => {
            const badge = document.getElementById(badgeId);
            badge.style.display = 'block';
            setTimeout(() => { badge.style.display = 'none'; }, 2000);
        });
    }

    function clearMail() {
        document.getElementById('tk').value = "";
        document.getElementById('wrap-mail').classList.add('hidden');
        document.getElementById('val-mail').innerText = "Waiting...";
    }
</script>

</body>
</html>
