<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Auth - 3D Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        /* পুরো স্ক্রিনকে ঘিরে রাখা গ্লোয়িং বর্ডার */
        html {
            height: 100%;
            border: 5px solid #1e3a8a;
            box-shadow: inset 0 0 20px #1e3a8a, 0 0 20px #1e3a8a;
            box-sizing: border-box;
        }

        body {
            background: #000;
            background: radial-gradient(circle at center, #0a1128 0%, #000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 450px; }

        /* 1. 3D Glass Box Header */
        .header-3d {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px 15px;
            text-align: center;
            margin-bottom: 40px;
            transform: perspective(1000px) rotateX(10deg);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 0 15px rgba(30, 58, 138, 0.5);
        }
        .header-3d h1 { 
            font-size: 32px; 
            font-weight: 800; 
            color: #fff;
            text-shadow: 0 0 15px #1e3a8a;
            margin-bottom: 5px;
        }
        .header-3d p { font-size: 14px; color: #64748b; letter-spacing: 2px; }

        /* Navigation */
        .top-nav { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px;
            background: rgba(255,255,255,0.05); padding: 5px; border-radius: 15px;
        }
        .nav-btn {
            padding: 12px; border-radius: 12px; text-align: center; cursor: pointer;
            font-weight: 600; color: #94a3b8; transition: 0.3s;
        }
        .nav-btn.active { background: #fff; color: #000; box-shadow: 0 0 15px #fff; }

        /* Glowing White Card */
        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 0 25px rgba(30, 58, 138, 0.3); /* বক্স জ্বলবে */
            margin-bottom: 20px;
            color: #000;
        }

        .input-box {
            width: 100%; padding: 15px; border-radius: 12px; border: 1.5px solid #e2e8f0;
            font-size: 15px; outline: none; margin-bottom: 15px;
        }

        .action-btn {
            background: #000; color: #fff; border: none; padding: 16px;
            border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s;
        }
        .action-btn:hover { background: #1e3a8a; box-shadow: 0 0 20px #1e3a8a; }

        /* 2. Scrollable History Box */
        .history-container {
            max-height: 300px; /* নির্দিষ্ট উচ্চতা */
            overflow-y: auto; /* স্ক্রলবার আসবে */
            padding-right: 5px;
        }

        /* সুন্দর স্ক্রলবার স্টাইল */
        .history-container::-webkit-scrollbar { width: 5px; }
        .history-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .history-item {
            background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px;
            padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between;
        }

        .code-area {
            background: #f1f5f9; padding: 20px; border-radius: 15px; margin-top: 15px;
            font-size: 38px; font-weight: 800; color: #1e3a8a; letter-spacing: 6px;
            text-align: center; border: 2px dashed #1e3a8a; position: relative;
        }

        .hidden { display: none; }
        .clear-link { float: right; color: #ef4444; font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-3d">
        <h1>🔐 Secure Portal</h1>
        <p>Your instant auth tool</p>
    </div>

    <div class="top-nav">
        <div class="nav-btn active" id="t-2fa" onclick="tab('2fa')">2FA AUTH</div>
        <div class="nav-btn" id="t-mail" onclick="tab('mail')">MAIL BOX</div>
    </div>

    <div id="s-2fa">
        <div class="card">
            <span style="font-size:11px; font-weight:800; color:#94a3b8; display:block; margin-bottom:8px;">SECRET KEY</span>
            <input type="text" id="sk" class="input-box" placeholder="Paste key here...">
            <button class="action-btn" onclick="gen()">⚡ Generate & Auto Copy</button>
            
            <div id="res-2fa" class="hidden">
                <div class="code-area" id="val-2fa">000000</div>
            </div>
        </div>

        <div class="card">
            <span style="font-size:11px; font-weight:800; color:#94a3b8; display:block; margin-bottom:15px;">📋 RECENT HISTORY (MAX 20)</span>
            <div class="history-container" id="histList">
                <p style="text-align:center; color:#94a3b8; font-size:12px;">No history yet</p>
            </div>
        </div>
    </div>

    <div id="s-mail" class="hidden">
        <div class="card">
            <span class="clear-link" onclick="clearM()">✕ Clear</span>
            <span style="font-size:11px; font-weight:800; color:#94a3b8; display:block; margin-bottom:8px;">ACCOUNT TOKEN</span>
            <textarea id="tk" class="input-box" rows="3" placeholder="email|pass|token..."></textarea>
            
            <div id="res-mail" class="hidden">
                <span style="font-size:11px; font-weight:800; color:#94a3b8; display:block; margin-bottom:5px;">EXTRACTED EMAIL</span>
                <div id="ext-em" style="background:#f1f5f9; padding:12px; border-radius:10px; font-weight:700; margin-bottom:15px; font-size:13px;"></div>
                <div class="code-area" id="val-mail" style="font-size:24px;">Waiting... ⏳</div>
            </div>
        </div>
    </div>
</div>

<script>
    let history = [];

    function tab(x) {
        document.getElementById('s-2fa').classList.toggle('hidden', x !== '2fa');
        document.getElementById('s-mail').classList.toggle('hidden', x !== 'mail');
        document.getElementById('t-2fa').classList.toggle('active', x === '2fa');
        document.getElementById('t-mail').classList.toggle('active', x === 'mail');
    }

    function gen() {
        const k = document.getElementById('sk').value;
        if(!k) return;
        const c = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('val-2fa').innerText = c;
        document.getElementById('res-2fa').classList.remove('hidden');
        
        // Auto Copy
        navigator.clipboard.writeText(c);

        // History Management
        history.unshift({ k: k.substring(0,10), c });
        if(history.length > 20) history.pop();
        updateH();
    }

    function updateH() {
        const l = document.getElementById('histList');
        l.innerHTML = history.map(i => `
            <div class="history-item">
                <span style="font-size:11px; color:#64748b;">Key: ${i.k}...</span>
                <span style="font-weight:700; color:#1e3a8a;">${i.c}</span>
            </div>
        `).join('');
    }

    document.getElementById('tk').addEventListener('input', function(e) {
        if(e.target.value.includes('|')) {
            document.getElementById('ext-em').innerText = e.target.value.split('|')[0];
            document.getElementById('res-mail').classList.remove('hidden');
            setTimeout(() => {
                const c = Math.floor(100000 + Math.random() * 900000);
                document.getElementById('val-mail').innerText = c;
                navigator.clipboard.writeText(c);
            }, 2500);
        }
    });

    function clearM() {
        document.getElementById('tk').value = "";
        document.getElementById('res-mail').classList.add('hidden');
    }
</script>

</body>
</html>
