<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Auth Portal</title>
    <style>
        /* CSS অংশ - এখানে প্রিমিয়াম ডিজাইন করা হয়েছে */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #000; /* ব্যাকগ্রাউন্ড একদম কালো */
            background: radial-gradient(circle at top, #1a1a1a 0%, #000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 22px;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 13px;
            color: #888;
        }

        /* প্রিমিয়াম কার্ড ডিজাইন */
        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 15px rgba(100, 149, 237, 0.1);
            color: #333;
            margin-bottom: 20px;
        }

        /* মেইন পেজের সাদা বাটন (কালো টেক্সট) */
        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .main-button {
            background: #fff;
            color: #000;
            border: 2px solid #eee;
            border-radius: 15px;
            padding: 20px 10px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .main-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
            border-color: #6495ED;
        }

        .main-button span { font-size: 30px; }

        /* ইনপুট বক্স - সাদা ব্যাকগ্রাউন্ড, কালো টেক্সট */
        .input-box {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border-radius: 10px;
            border: 2px solid #ddd;
            background: #fff;
            color: #000;
            font-size: 15px;
            outline: none;
        }

        .input-box:focus {
            border-color: #6495ED;
        }

        /* Soft Blue Button (জেনারেট ও কপি) */
        .btn-blue {
            background: #6495ED;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-blue:hover {
            background: #4169E1;
            box-shadow: 0 0 15px rgba(100, 149, 237, 0.4);
        }

        .hidden { display: none; }

        .back-btn {
            color: #888;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 15px;
            display: inline-block;
        }

        /* কোড ডিসপ্লে এলাকা */
        .code-output {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 5px;
            color: #6495ED;
            margin: 15px 0;
            border: 1px dashed #6495ED;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="mainPage">
        <div class="header">
            <h1>🔐 Secure Authentication</h1>
            <p>Generate codes instantly</p>
        </div>
        <div class="card">
            <div class="button-grid">
                <div class="main-button" onclick="open2FA()">
                    <span>🔐</span> 2FA AUTH
                </div>
                <div class="main-button" onclick="openMail()">
                    <span>📧</span> MAIL BOX
                </div>
            </div>
        </div>
    </div>

    <div id="page2FA" class="hidden">
        <span class="back-btn" onclick="goHome()">← Back to Home</span>
        <div class="card">
            <h3>🔐 2FA Authenticator</h3>
            <p style="font-size: 12px; color: #666; margin-bottom: 15px;">Enter secret key to get code</p>
            
            <label style="font-size: 13px; font-weight: bold;">SECRET KEY</label>
            <input type="text" id="secretKey" class="input-box" placeholder="Paste your key here...">
            
            <button class="btn-blue" onclick="generate2FA()">🔑 Generate Code</button>
            
            <div id="output2FA" class="hidden">
                <div class="code-output" id="val2FA">000000</div>
                <button class="btn-blue" style="background: #333;" onclick="copy('val2FA')">📋 Copy Code</button>
            </div>
        </div>
    </div>

    <div id="pageMail" class="hidden">
        <span class="back-btn" onclick="goHome()">← Back to Home</span>
        <div class="card">
            <h3>📧 Mail Box Generator</h3>
            <textarea id="mailInput" class="input-box" style="height: 80px;" placeholder="email|pass|token..."></textarea>
            
            <div id="mailResult" class="hidden">
                <div style="margin-top: 15px;">
                    <label style="font-size: 12px;">EXTRACTED EMAIL:</label>
                    <div id="extEmail" style="font-weight: bold; padding: 10px; background: #eee; border-radius: 5px; margin-top: 5px;"></div>
                    <button class="btn-blue" style="padding: 5px; font-size: 12px;" onclick="copy('extEmail')">Copy Email</button>
                </div>

                <div style="margin-top: 15px;">
                    <label
