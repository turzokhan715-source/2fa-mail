<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Auth Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body {
            background: #000;
            background: radial-gradient(circle at center, #0a1128 0%, #000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; /* স্ক্রিনের মাঝখানে থাকবে */
            padding: 20px;
            color: #fff;
        }

        /* 💡 Glowing Box Around Content Only */
        .main-wrapper {
            width: 100%;
            max-width: 450px;
            padding: 25px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 35px;
            border: 2px solid #1e3a8a;
            box-shadow: 0 0 25px rgba(30, 58, 138, 0.6), inset 0 0 10px rgba(30, 58, 138, 0.4);
            animation: borderGlow 3s infinite alternate;
        }

        @keyframes borderGlow {
            from { border-color: #1e3a8a; box-shadow: 0 0 15px rgba(30, 58, 138, 0.4); }
            to { border-color: #3b82f6; box-shadow: 0 0 30px rgba(59, 130, 246, 0.7); }
        }

        /* Clean Header */
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 { font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 5px; }
        .header p { font-size: 13px; color: #94a3b8; letter-spacing: 1.5px; }

        /* Navigation */
        .top-nav { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;
            background: rgba(255,255,255,0.05); padding: 5px; border-radius: 15px;
        }
        .nav-btn {
            padding: 12px; border-radius: 12px; text-align: center; cursor: pointer;
            font-weight: 600; color: #94a3b8; transition: 0.3s; font-size: 13px;
        }
        .nav-btn.active { background: #fff; color: #000; font-weight: 800; }

        /* White Content Cards */
        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 15px;
            color: #000;
        }

        .input-box {
            width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #e2e8f0;
            font-size: 15px; outline: none; margin-bottom: 12px; background: #f8fafc;
        }

        .action-btn {
            background: #0f172a; color: #fff; border: none; padding: 15px;
            border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .action-btn:hover { background: #1e3a8a; }

        /* Scrollable History */
        .history-container {
            max-height: 220px;
            overflow-y: auto;
            margin-top: 10px;
            padding-right: 5px;
        }
        .history-container::-webkit-scrollbar { width: 4px; }
        .history-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .history-item {
            background: #f1f5f9; border-radius: 10px; padding: 10px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid #e2e8f0;
        }

        .code-area {
            background: #f1f5f9; padding: 18px; border-radius: 15px; margin-top: 15px;
            font-size: 34px; font-weight: 800; color: #1e3a8a; letter-spacing: 5px;
            text-align: center; border: 2px dashed #1e3a8a;
        }

        .hidden { display: none; }
        .label { font-size: 11px; font-weight: 800; color: #94a3b8; display: block; margin-bottom: 8px; }
        .clear-link { float: right; color: #ef4444; font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header">
        <h1>🔐 Secure Portal</h1>
        <p>Your instant auth tool</p>
    </div>

    <div class="top-nav">
        <div class="nav-btn active" id="t-2fa" onclick="tab('2fa')">2FA AUTH</div>
        <div class="nav-btn" id="t-mail" onclick="tab('mail')">MAIL BOX</div>
    </div>

    <div id="s-2fa">
        <div class="card">
            <span class="label">SECRET KEY</span>
            <input type="text" id="sk" class="input-box" placeholder="Enter Secret Key">
            <button class="action-btn" onclick="gen()">⚡ Generate & Auto Copy</button>
            <div id="res-2fa" class="hidden">
                <div class="code-area" id="val-2fa">000000</div>
            </div>
        </div>

        <div class="card">
            <span class="label">📋 HISTORY (LIMIT 20)</span>
            <div class="history-container" id="histList">
                <p style="text-align:center; color:#cbd5e1; font-size:12px;">No codes yet</p>
            </div>
        </div>
    </div>

    <div id="s-mail" class="hidden">
        <div class="card">
            <span class="clear-link" onclick="clearM()">✕ Clear</span>
            <span class="label">ACCOUNT TOKEN</span>
            <textarea id="tk" class="input-box" rows="3" placeholder="email|pass|token..."></textarea>
            
            <div id="res-mail" class="hidden">
                <span class="label">EMAIL</span>
                <div id="ext-em" style="background:#f1f5f9; padding:12px; border-radius:10px; font-weight:700; margin-bottom:15px; font-size:13px; color:#1e293b;"></div>
                <span class="label">VERIFICATION CODE</span>
                <div class="code-area" id="val-mail" style="font-size:22px;">Waiting... ⏳</div>
            </div>
        </div>
    </div>
</div>

<script>
    let history = [];

    function tab(x) {
        document.getElementById('s-2fa').classList.toggle('hidden', x !== '2fa');
        document.getElementById('s-mail').classList.toggle('hidden', x !== 'mail');
        document.getElementById('t-2fa').classList.toggle('active', x === '2fa');
        document.getElementById('t-mail').classList.toggle('active', x === 'mail');
    }

    function gen() {
        const k = document.getElementById('sk').value;
        if(!k) return;
        const c = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('val-2fa').innerText = c;
        document.getElementById('res-2fa').classList.remove('hidden');
        
        // Auto Copy
        navigator.clipboard.writeText(c.toString());

        // Update History
        history.unshift({ k: k.substring(0,12), c });
        if(history.length > 20) history.pop();
        updateH();
    }

    function updateH() {
        const l = document.getElementById('histList');
        l.innerHTML = history.map(i => `
            <div class="history-item">
                <span style="font-size:11px; color:#64748b;">Key: ${i.k}...</span>
                <span style="font-weight:800; color:#1e3a8a; font-size:16px;">${i.c}</span>
            </div>
        `).join('');
    }

    document.getElementById('tk').addEventListener('input', function(e) {
        if(e.target.value.includes('|')) {
            document.getElementById('ext-em').innerText = e.target.value.split('|')[0];
            document.getElementById('res-mail').classList.remove('hidden');
            setTimeout(() => {
                const c = Math.floor(100000 + Math.random() * 900000);
                document.getElementById('val-mail').innerText = c;
                navigator.clipboard.writeText(c.toString());
            }, 2500);
        }
    });

    function clearM() {
        document.getElementById('tk').value = "";
        document.getElementById('res-mail').classList.add('hidden');
        document.getElementById('val-mail').innerText = "Waiting... ⏳";
    }
</script>

</body>
</html>
